# Alembic configuration for StudyMate API

[alembic]
# Path to migration scripts
script_location = migrations

# Template used for new migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps (UTC recommended)
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version number format
# version_num_format =

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# SQLAlchemy URL — loaded from environment in env.py, not hardcoded here
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Hooks run after a new revision file is generated
# Uncomment to auto-format migrations with ruff:
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
